[build-system]
requires = ["hatchling"]
build-backend = "hatchling.backends"

[project]
name = "pay-lens-etl"
version = "0.1.0"
description = "ETL pipeline for Ontario Sunshine List pay transparency data"
requires-python = ">=3.11"
dependencies = [
    "polars>=1.17",
    "rapidfuzz>=3.10",
    "httpx>=0.28",
    "pyarrow>=18.0",
    "pydantic>=2.10",
    "pydantic-settings>=2.0",
    "typer>=0.15",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3",
]

[project.scripts]
pay-lens-etl = "etl.runner:app"

[tool.hatch.build.targets.wheel]
packages = ["src/etl"]

[tool.pytest.ini_options]
testpaths = ["tests"]
