name: Keep Turso DB warm

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Turso
        env:
          DB_URL: ${{ secrets.NEXT_PUBLIC_TURSO_DATABASE_URL }}
          DB_TOKEN: ${{ secrets.NEXT_PUBLIC_TURSO_AUTH_TOKEN }}
        run: |
          HTTP_URL="${DB_URL/libsql:\/\//https://}"
          curl -sf -X POST "$HTTP_URL/v2/pipeline" \
            -H "Authorization: Bearer $DB_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"requests":[{"type":"execute","stmt":{"sql":"SELECT 1"}},{"type":"close"}]}' \
            > /dev/null
          echo "Turso ping OK"
