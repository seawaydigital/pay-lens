name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build
        env:
          NEXT_PUBLIC_TURSO_DATABASE_URL: ${{ secrets.NEXT_PUBLIC_TURSO_DATABASE_URL }}
          NEXT_PUBLIC_TURSO_AUTH_TOKEN: ${{ secrets.NEXT_PUBLIC_TURSO_AUTH_TOKEN }}
        run: pnpm run build --filter=web

      - name: Ensure covering indexes on Turso
        env:
          TURSO_URL: ${{ secrets.NEXT_PUBLIC_TURSO_DATABASE_URL }}
          TURSO_TOKEN: ${{ secrets.NEXT_PUBLIC_TURSO_AUTH_TOKEN }}
        working-directory: apps/web
        run: |
          cat > ensure-indexes.mjs << 'EOF'
          import { createClient } from '@libsql/client';
          const db = createClient({ url: process.env.TURSO_URL, authToken: process.env.TURSO_TOKEN });
          await db.execute('CREATE INDEX IF NOT EXISTS idx_disc_title_year_sal ON disclosures(job_title, year, salary_paid)');
          console.log('idx_disc_title_year_sal: OK');
          db.close();
          EOF
          node ensure-indexes.mjs
          rm ensure-indexes.mjs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
